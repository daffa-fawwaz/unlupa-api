version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    container_name: hifzhun-postgres
    environment:
      POSTGRES_USER: hifzhun
      POSTGRES_PASSWORD: hifzhun
      POSTGRES_DB: hifzhun
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hifzhun"]
      interval: 5s
      timeout: 3s
      retries: 10

  supabase-health:
    image: curlimages/curl:latest
    container_name: hifzhun-supabase-health
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    entrypoint: >
      sh -c "
        echo 'Checking Supabase connectivity...' &&
        curl -sf -o /dev/null
          -H 'apikey: '\"$$SUPABASE_SERVICE_ROLE_KEY\"''
          -H 'Authorization: Bearer '\"$$SUPABASE_SERVICE_ROLE_KEY\"''
          \"$$SUPABASE_URL/rest/v1/\" &&
        echo 'Supabase: healthy' ||
        (echo 'Supabase: unreachable, continuing anyway' && exit 0)
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -o /dev/null -H \"apikey: $$SUPABASE_SERVICE_ROLE_KEY\" -H \"Authorization: Bearer $$SUPABASE_SERVICE_ROLE_KEY\" \"$$SUPABASE_URL/rest/v1/\" && echo healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hifzhun-api
    env_file:
      - .env
    environment:
      APP_PORT: "3000"
      DB_HOST: postgres
      DB_USER: hifzhun
      DB_PASSWORD: hifzhun
      DB_NAME: hifzhun
      DB_PORT: "5432"
      DB_SSLMODE: disable
      DB_TIMEZONE: Asia/Jakarta
      CACHE_DISABLED: "true"
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  pgdata:
